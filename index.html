<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DragonSMP Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:30px;
text-align:center;
border-bottom:4px solid #FFD700;
}

header h1{
color:#FFD700;
font-size:55px;
font-weight:900;
text-shadow:0 0 20px #FFD700;
}

header p{
margin-top:10px;
color:#ccc;
}

section{
padding:50px;
}

h2{
color:#FFD700;
font-size:36px;
margin-bottom:30px;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{

background:#1a1a1a;
border:2px solid #FFD700;
border-radius:15px;
padding:25px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #FFD700;
}

.card h3{
color:#FFD700;
margin-bottom:15px;
font-size:28px;
}

.price{
font-size:24px;
margin:15px 0;
font-weight:bold;
}

button{
background:#FFD700;
border:none;
padding:15px 30px;
font-size:18px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
transition:.25s;
}

button:hover{
background:white;
}

footer{
margin-top:60px;
padding:20px;
text-align:center;
background:black;
color:#888;
border-top:3px solid #FFD700;
}

</style>

</head>
<body>

<header>

<h1>🐉 DragonSMP Store</h1>

<p>Support the server and unlock awesome rewards!</p>

</header>

<section>

<h2>⭐ Ranks</h2>

<div class="container">

<div class="card">
<h3>VIP</h3>
<div class="price">$1.99</div>
<a href="#"><button>Buy</button></a>
</div>

<div class="card">
<h3>BABYDRAGON</h3>
<div class="price">$4.99</div>
<a href="#"><button>Buy</button></a>
</div>

<div class="card">
<h3>DRAGON</h3>
<div class="price">$7.99</div>
<a href="#"><button>Buy</button></a>
</div>

<div class="card">
<h3>BIGDRAGON</h3>
<div class="price">$13.99</div>
<a href="#"><button>Buy</button></a>
</div>

</div>

</section>

<section>

<h2>🔑 Crate Keys</h2>

<div class="container">

<div class="card">
<h3>Iron Key</h3>
<div class="price">$1.99</div>
<a href="#"><button>Buy</button></a>
</div>

<div class="card">
<h3>Diamond Key</h3>
<div class="price">$3.99</div>
<a href="#"><button>Buy</button></a>
</div>

<div class="card">
<h3>Netherite Key</h3>
<div class="price">$5.99</div>
<a href="#"><button>Buy</button></a>
</div>

<div class="card">
<h3>Dragon Key</h3>
<div class="price">$7.99</div>
<a href="#"><button>Buy</button></a>
</div>

<div class="card">
<h3>Fly Key</h3>
<div class="price">$9.99</div>
<a href="#"><button>Buy</button></a>
</div>

</div>

</section>

<footer>

© 2026 DragonSMP Store • All Rights Reserved

</footer>

</body>
</html>
